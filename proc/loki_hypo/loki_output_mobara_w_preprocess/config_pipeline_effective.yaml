yaml: /workspace/data/config/loki_waveform_pipeline.yaml
preset: mobara
params:
  base_input_dir: /workspace/data/waveform
  base_traveltime_dir: /workspace/proc/loki_hypo/mobara_traveltime
  loki_data_path: tmp
  loki_output_path: loki_output_mobara_w_preprocess
  loki_db_path: /workspace/proc/loki_hypo/mobara_traveltime/db
  loki_hdr_filename: header.hdr
  inputs_yaml: /workspace/data/config/loki_inputs.yaml
  inputs_preset: default
  comp:
  - U
  - N
  - E
  precision: single
  search: classic
  extension: '*'
  event_glob: '[0-9]*'
  max_events: null
