# recipe_case.yaml

# ---- recipe（生成に必要）----
dataset_dir: "/workspace/data/synthe/synth_surface25_das9_2km_uniform_stride101010_noNoise"
outputs_dir: "case_das2_line_0_1000m_chint10m"

paths:
  template_cmd: "/workspace/external_source/hyp1.40/template/template.cmd"
  hypoinverse_exe: "/workspace/external_source/hyp1.40/hypoinverse.exe"   # ← exe を指定
  sim_yaml: "auto"
  receiver_geometry: "auto"

selection:
  surface:
    enabled: false
    recv_id: "geo_surface_5x5"
    component_indices: [6,7,8,11,12,13,16,17,18]
  das:
    wells: ["das_well_01", "das_well_03"]
    depth_range_m: [0.0, 1500.0]
    decimate: 5

output:
  config_yaml_path: "/workspace/proc/hypocenter_determination/synth_hypoinverse_eval/configs/case2_das2_chint10m.yaml"


# ---- デフォルト（ジオメトリ以外は全部これが最終configに載る）----

# ====== モデル設定（CRE）======
model_type: "CRE"
use_station_elev: true
z_is_depth_positive: true

cre_reference_margin_m: 0.0
cre_typical_station_elevation_m: null
cre_n_layers: 1

# CRE + use_station_elev のときは二重補正回避で false
apply_station_elevation_delay: false

# ====== 震源決定/評価パラメータ ======
lat0: 35.0
lon0: 140.0
origin0: "2026-01-01T00:00:00"
dt_sec: 10.0
max_events: 0

default_depth_km: 0.5
fix_depth: false

arc_use_jma_flag: false
arc_p_centroid_top_n: 5
arc_origin_time_offset_sec: 1.0

das_station_prefix: "D"
das_phase_weight_code: 3

uncertainty_plot:
  enabled: true
  display_mode: slice
  sigma_scale_sec: 0.05
  poor_thresh_km: 5.0
  clip_km: 10.0
  n_ellipse_points: 100
  ellipse_lw: 0.8
  ellipse_alpha: 0.85
  slice:
    xy:
      enabled: true
      coord_m: 500.0
      half_thickness_m: 50.0
    xz:
      enabled: true
      coord_m: 5000.0
      half_thickness_m: 50.0
    yz:
      enabled: true
      coord_m: 5000.0
      half_thickness_m: 50.0
  event_subsample:
    stride_ijk: [2, 2, 2]
heatmap:
  enabled: true
  metrics:
  - err3d_m
  - horiz_m
  - dz_m
  - ERH
  - ERZ
  slices:
    xy_all_depths: true
    xz_center_y: true
    yz_center_x: true
  scale:
    percentile: 99
    global_across_slices: true
    dz_symmetric: true
    vmin: 0.0
    vmax: 200.0
  output:
    save_npy: true
    save_axes_json: true
    out_dirname: heatmaps

event_subsample:
  stride_ijk:
  - 1
  - 1
  - 1
event_filter:
  z_range_m:
  - 500.0
  - null
