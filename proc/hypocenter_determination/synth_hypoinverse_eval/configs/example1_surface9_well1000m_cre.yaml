# ---- path系（ルール通り）----
dataset_dir: "/workspace/data/synthe/example1_das1_surface9_well1000m"     # 絶対パス
sim_yaml: "pipeline_example_das1_surface9_well1000m.yaml"
outputs_dir: "example_surface_cre"
template_cmd: "/workspace/external_source/hyp1.40/template/template.cmd" # 絶対パス
hypoinverse_exe: "/workspace/external_source/hyp1.40/hypoinverse.exe"          # 絶対パス
receiver_geometry: "recv_das1_geo9_0001.npy"

# ---- CRE運用（station elevation を travel-time 計算へ委譲）----
model_type: "CRE"
use_station_elev: true

# receiver_geometry の z は depth(+down) 前提（Elevation_m = -z_m）
z_is_depth_positive: true

# CRE の参照標高（ref = (max(Elevation_m)+margin)/1000）
cre_reference_margin_m: 0.0

# CRH資産の typical elevation（未指定/ null は 0.0 km 扱い）
cre_typical_station_elevation_m: null

# 合成の層境界（[0,1,2,...] km）生成用
cre_n_layers: 1

# CRH + station delay 近似は使わない（CRE + use_station_elev と同時有効は二重補正になるため）
apply_station_elevation_delay: false


# ---- 非path（ここは自由に残す）----
station_subset:
  surface_indices: "all"

lat0: 35.0
lon0: 140.0

origin0: "2026-01-01T00:00:00"
dt_sec: 10.0
max_events: 0            # 0=全イベント

default_depth_km: 0.5
fix_depth: False

arc_use_jma_flag: false
arc_p_centroid_top_n: 1
arc_origin_time_offset_sec: 1.0

# DAS を 1ch=1観測点として扱うと過剰に効くので、Hypoinverse のフェーズ weight で低重み化する。
# weight は 0〜4 想定（0が最大重み、数字が大きいほど低重み）。
das_station_prefix: "D"
das_phase_weight_code: 3

uncertainty_plot:
  sigma_scale_sec: 0.05
  poor_thresh_km: 5.0
  clip_km: 10.0
