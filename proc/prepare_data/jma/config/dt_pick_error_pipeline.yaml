version: 1
run:
  run_id: "dt_stalta_p_u_YYYYMMDD_01"
  out_dir: "runs/${run.run_id}"
  overwrite: true
  notes: ""
inputs:
  event_root: "/workspace/data/waveform/jma/event"
  epicenters_csv: "/workspace/data/arrivetime/JMA/arrivetime_epicenters_2023.0.csv"
  measurements_csv: "/workspace/data/arrivetime/JMA/arrivetime_measurements_2023.0.csv"
  mapping_report_csv: "/workspace/proc/prepare_data/jma/stationcode_match/v1/match_out_final/mapping_report.csv"
  near0_csv: "/workspace/proc/prepare_data/jma/stationcode_match/v1/match_out_final/near0_suggestions.csv"
  monthly_presence_csv: "/workspace/proc/prepare_data/jma/stationcode_match/v1/snapshots/monthly/monthly_presence.csv"
  mag1_types_allowed: ["v", "V"]
  distance: "hypocentral"
  phase_defs:
    P: ["P", "EP", "IP"]
    S: ["S", "ES", "IS"]
  stations_allowlist: null
  event_id_allowlist: null
preprocess:
  preprocess_preset: "jma_snr_pick_table_v1"
  fs_target_hz: 100
  detrend: "linear"
  bandpass:
    fstop_lo: 0.5
    fpass_lo: 1.0
    fpass_hi: 20.0
    fstop_hi: 25.0
    gpass: 1.0
    gstop: 40.0
picker:
  picker_name: "stalta"
  picker_preset: "stalta_p_v1"
  phase: "P"
  component: "U"
  stalta:
    transform: "raw"
    sta_sec: 0.3
    lta_sec: 2.0
pick_extract:
  search_pre_sec: 1.0
  search_post_sec: 3.0
  clip_search_window: true
  choose: "max"
  tie_break: "min_t"
  thr: 0.20
  min_sep_sec: 0.20
  search_i1_inclusive: true
eval:
  tol_sec: [0.05, 0.10, 0.20]
  keep_missing_rows: true
output:
  dt_table_csv: "dt_table.csv"
  skips_csv: "skips.csv"
  save_config_snapshot: true
experiments:
  - name: "thr_0p10"
    pick_extract:
      thr: 0.10
  - name: "thr_0p20"
    pick_extract:
      thr: 0.20
